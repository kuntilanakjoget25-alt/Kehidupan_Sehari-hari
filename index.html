<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LackyLife – Personal Life Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#22C55E;--green-light:#86EFAC;--green-dark:#16A34A;--green-50:#F0FDF4;--green-100:#DCFCE7;
  --bg:#F8FAFC;--surface:#FFFFFF;--surface2:#F1F5F9;--border:#E2E8F0;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --red:#EF4444;--amber:#F59E0B;--blue:#3B82F6;--purple:#8B5CF6;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.06);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;--radius-xl:20px;
  --sidebar-w:240px;--nav-h:60px;
  --trans:all .2s cubic-bezier(.4,0,.2,1);
}
.dark{
  --bg:#0F172A;--surface:#1E293B;--surface2:#334155;--border:#334155;
  --text:#F1F5F9;--text2:#94A3B8;--text3:#475569;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.3),0 2px 4px -2px rgba(0,0,0,.2);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.3),0 4px 6px -4px rgba(0,0,0,.2);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;transition:background .3s,color .3s}
#root{height:100%}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;outline:none;transition:var(--trans)}
input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.15)}
select option{background:var(--surface);color:var(--text)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:var(--trans);flex-shrink:0;z-index:100}
.sidebar-logo{padding:18px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--green),var(--green-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800;flex-shrink:0}
.logo-text{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-text span{color:var(--green)}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-section{margin-bottom:20px}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:0 10px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--text2);font-weight:500;cursor:pointer;transition:var(--trans);margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--green-50);color:var(--green-dark)}
.nav-item.active{background:var(--green-100);color:var(--green-dark);font-weight:600}
.dark .nav-item:hover{background:rgba(34,197,94,.1);color:var(--green-light)}
.dark .nav-item.active{background:rgba(34,197,94,.15);color:var(--green-light)}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;min-width:18px;text-align:center}
.sidebar-footer{padding:14px 10px;border-top:1px solid var(--border)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* NAVBAR */
.navbar{height:var(--nav-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.navbar-title{font-size:16px;font-weight:700;color:var(--text);flex:1}
.navbar-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-weight:500;transition:var(--trans);white-space:nowrap}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark);transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-ghost{color:var(--text2);border-radius:var(--radius-sm)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);font-size:16px}
.btn-sm{padding:5px 10px;font-size:12px}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card-sm{padding:14px 16px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
.flex{display:flex}
.flex-col{flex-direction:column}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.w-full{width:100%}
.text-sm{font-size:12px}.text-xs{font-size:11px}
.font-600{font-weight:600}.font-700{font-weight:700}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-amber{color:var(--amber)}
.text-2{color:var(--text2)}
.text-3{color:var(--text3)}
/* STAT CARD */
.stat-card{display:flex;flex-direction:column;gap:8px}
.stat-label{font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px}
.stat-value{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:4px}
.stat-icon.green{background:var(--green-100);color:var(--green-dark)}
.stat-icon.red{background:rgba(239,68,68,.1);color:var(--red)}
.stat-icon.blue{background:rgba(59,130,246,.1);color:var(--blue)}
.stat-icon.purple{background:rgba(139,92,246,.1);color:var(--purple)}
.dark .stat-icon.green{background:rgba(34,197,94,.15)}
.dark .stat-icon.red{background:rgba(239,68,68,.15)}
.dark .stat-icon.blue{background:rgba(59,130,246,.15)}
.dark .stat-icon.purple{background:rgba(139,92,246,.15)}
/* PROGRESS */
.progress-bar{height:8px;background:var(--surface2);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:999px;transition:width .5s ease}
.progress-fill.red{background:var(--red)}
.progress-fill.amber{background:var(--amber)}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-100);color:var(--green-dark)}
.badge-red{background:rgba(239,68,68,.1);color:var(--red)}
.badge-amber{background:rgba(245,158,11,.1);color:var(--amber)}
.badge-blue{background:rgba(59,130,246,.1);color:var(--blue)}
.badge-gray{background:var(--surface2);color:var(--text2)}
.dark .badge-green{background:rgba(34,197,94,.15)}
.dark .badge-amber{background:rgba(245,158,11,.15)}
.dark .badge-red{background:rgba(239,68,68,.15)}
.dark .badge-blue{background:rgba(59,130,246,.15)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:20px}
.modal-footer{padding:0 20px 20px;display:flex;gap:10px;justify-content:flex-end}
/* FORM */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;background:var(--surface2);transition:var(--trans)}
.form-input:focus{background:var(--surface);border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.15);outline:none}
select.form-input{cursor:pointer}
textarea.form-input{resize:vertical;min-height:80px}
/* TRANSACTION */
.txn-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.txn-item:last-child{border-bottom:none}
.txn-cat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.txn-info{flex:1;min-width:0}
.txn-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-meta{font-size:11px;color:var(--text3);margin-top:1px}
.txn-amount{font-weight:700;font-size:14px;white-space:nowrap}
/* TASK */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:var(--trans)}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.task-text{flex:1;min-width:0}
.task-title{font-weight:500;font-size:13px}
.task-title.done{text-decoration:line-through;color:var(--text3)}
/* AI CHAT */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - var(--nav-h) - 48px)}
.chat-sidebar{width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.chat-input-area{padding:16px;border-top:1px solid var(--border)}
.msg{display:flex;gap:10px;max-width:80%}
.msg.user{margin-left:auto;flex-direction:row-reverse}
.msg-bubble{padding:10px 14px;border-radius:var(--radius);font-size:13px;line-height:1.6}
.msg.assistant .msg-bubble{background:var(--surface2);color:var(--text)}
.msg.user .msg-bubble{background:var(--green);color:#fff}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700}
.msg.assistant .msg-avatar{background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff}
.msg.user .msg-avatar{background:var(--blue);color:#fff}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;text-transform:uppercase}
.cal-cell{min-height:72px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px;cursor:pointer;transition:var(--trans);position:relative}
.cal-cell:hover{border-color:var(--green);background:var(--green-50)}
.dark .cal-cell:hover{background:rgba(34,197,94,.05)}
.cal-cell.today{border-color:var(--green);background:var(--green-50)}
.dark .cal-cell.today{background:rgba(34,197,94,.08)}
.cal-cell.other-month .cal-date{color:var(--text3)}
.cal-cell.selected{border-color:var(--green);box-shadow:0 0 0 2px var(--green)}
.cal-date{font-size:12px;font-weight:600;color:var(--text)}
.cal-cell.today .cal-date{color:var(--green);font-weight:800}
.cal-event-dot{font-size:10px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--green);color:#fff;border-radius:4px;padding:1px 4px}
/* SETTINGS */
.settings-section{margin-bottom:28px}
.settings-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-info{}
.settings-name{font-weight:600;font-size:13px}
.settings-desc{font-size:11px;color:var(--text3);margin-top:2px}
/* TOGGLE */
.toggle{width:40px;height:22px;background:var(--border);border-radius:999px;position:relative;cursor:pointer;transition:var(--trans);flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:var(--trans);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(18px)}
/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:14px;color:var(--text2);margin-bottom:4px}
.empty-sub{font-size:12px;color:var(--text3)}
/* LANG SELECTOR */
.lang-btn{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:var(--trans);background:var(--surface)}
.lang-btn:hover{border-color:var(--green);color:var(--green)}
/* TOAST */
.toast-container{position:fixed;top:70px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;pointer-events:all;animation:toastIn .3s ease;min-width:260px}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--blue)}
@keyframes toastIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
/* SEARCH */
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;transition:var(--trans)}
.search-box:focus-within{border-color:var(--green);background:var(--surface);box-shadow:0 0 0 3px rgba(34,197,94,.15)}
.search-box input{border:none;background:transparent;outline:none;flex:1;color:var(--text)}
/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:20px;font-weight:800;letter-spacing:-.4px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
/* DIVIDER */
.divider{height:1px;background:var(--border);margin:16px 0}
/* SAVING GOAL */
.goal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.goal-accent{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--blue))}
/* TYPING ANIMATION */
.typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text3);animation:typingBounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* MOBILE */
.sidebar-toggle{display:none}
@media(max-width:768px){
  .sidebar{position:fixed;left:-var(--sidebar-w);transform:translateX(-100%);height:100vh}
  .sidebar.open{transform:translateX(0)}
  .sidebar-toggle{display:flex}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .chat-sidebar{display:none}
  .modal{max-width:100%;margin:0}
}
/* MARKDOWN in chat */
.md-content code{background:rgba(0,0,0,.1);padding:1px 4px;border-radius:4px;font-size:12px;font-family:monospace}
.msg.user .md-content code{background:rgba(255,255,255,.2)}
.md-content strong{font-weight:700}
.md-content em{font-style:italic}
.md-content p{margin-bottom:6px}
.md-content p:last-child{margin-bottom:0}
.md-content ul,.md-content ol{padding-left:16px;margin-bottom:6px}
.md-content li{margin-bottom:2px}
/* AGENDA */
.agenda-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.agenda-item:last-child{border-bottom:none}
.agenda-time{font-size:11px;font-weight:600;color:var(--green);min-width:70px;padding-top:2px}
.agenda-title{font-weight:600;font-size:13px}
.agenda-desc{font-size:11px;color:var(--text3);margin-top:2px}
/* Section tabs */
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius-sm);padding:4px}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:var(--trans)}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.tab:hover:not(.active){color:var(--text)}
/* Recharts override */
.recharts-cartesian-axis-tick text{fill:var(--text3) !important;font-size:11px}
.recharts-tooltip-wrapper{outline:none}
/* AI tool bar */
.ai-tool{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);transition:var(--trans);background:var(--surface)}
.ai-tool:hover,.ai-tool.active{border-color:var(--green);color:var(--green);background:var(--green-50)}
.dark .ai-tool:hover,.dark .ai-tool.active{background:rgba(34,197,94,.1)}
/* Scrollable inner */
.scroll-y{overflow-y:auto}
/* Finance filter */
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
/* Trend indicator */
.trend{font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:2px}
.trend.up{color:var(--green)}
.trend.down{color:var(--red)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useEffect,useRef,useCallback,useMemo}=React;

// ═══════════════════════════════════════════════
// TRANSLATIONS
// ═══════════════════════════════════════════════
const TRANSLATIONS={
  en:{
    appName:'LackyLife',
    dashboard:'Dashboard',finance:'Finance',savings:'Savings',calendar:'Calendar',
    todos:'To-Do List',ai:'AI Assistant',settings:'Settings',
    totalBalance:'Total Balance',totalIncome:'Total Income',totalExpenses:'Total Expenses',
    savingsProgress:'Savings Progress',recentTransactions:'Recent Transactions',
    todaysTasks:"Today's Tasks",todaysEvents:"Today's Events",quickAI:'Quick AI',
    addTransaction:'Add Transaction',editTransaction:'Edit Transaction',
    income:'Income',expense:'Expense',amount:'Amount',description:'Description',
    category:'Category',date:'Date',type:'Type',search:'Search...',
    all:'All',food:'Food',transportation:'Transportation',education:'Education',
    shopping:'Shopping',entertainment:'Entertainment',health:'Health',bills:'Bills',other:'Other',
    monthlyIncome:'Monthly Income',monthlyExpenses:'Monthly Expenses',
    expenseBreakdown:'Expense Breakdown',monthlyTrends:'Monthly Trends',

// Markdown renderer (simple)
function renderMd(text){
  if(!text)return '';
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code>$1</code>')
    .replace(/^### (.*)/gm,'<h4 style="font-weight:700;margin:8px 0 4px">$1</h4>')
    .replace(/^## (.*)/gm,'<h3 style="font-weight:700;margin:10px 0 4px">$1</h3>')
    .replace(/^# (.*)/gm,'<h2 style="font-weight:800;margin:10px 0 4px">$1</h2>')
    .replace(/^- (.*)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,(m)=>`<ul>${m}</ul>`)
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

function ToastContainer({toasts,removeToast}){
  return h('div',{className:'toast-container'},
    toasts.map(t=>h('div',{key:t.id,className:`toast ${t.type||'info'}`,onClick:()=>removeToast(t.id)},
      h('span',null,t.type==='success'?'✅':t.type==='error'?'❌':'ℹ️'),
      h('span',null,t.msg)
    ))
  );
}
function useToast(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='success')=>{
    const id=uid();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3000);
  },[]);
  const remove=useCallback((id)=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  return {toasts,addToast:add,removeToast:remove};
}

function Modal({title,onClose,children,footer}){
  useEffect(()=>{
    const h=(e)=>{if(e.key==='Escape')onClose()};
    document.addEventListener('keydown',h);
    return ()=>document.removeEventListener('keydown',h);
  },[onClose]);
  return h('div',{className:'modal-overlay',onClick:(e)=>{if(e.target===e.currentTarget)onClose()}},
    h('div',{className:'modal'},
      h('div',{className:'modal-header'},
        h('h3',{className:'modal-title'},title),
        h('button',{className:'btn btn-ghost btn-icon',onClick:onClose},'✕')
      ),
      h('div',{className:'modal-body'},children),
      footer&&h('div',{className:'modal-footer'},footer)
    )
  );
}

function Savings({lang,goals,setGoals,currency,addToast}){

            h('span',{className:`badge badge-${col==='green'?'green':col==='amber'?'amber':'red'}`},p+'%'),

// CALENDAR
// ═══════════════════════════════════════════════
function Calendar({lang,events,setEvents,addToast}){
  const now=new Date();
  const [viewDate,setViewDate]=useState({year:now.getFullYear(),month:now.getMonth()});
  const [selected,setSelected]=useState(today());
  const [modal,setModal]=useState(null);
  const [editing,setEditing]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [tab,setTab]=useState('month');
  const emptyForm={title:'',description:'',date:today(),time:'',reminder:false};
  const [form,setForm]=useState(emptyForm);

  const {year,month}=viewDate;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevMonth=()=>setViewDate(p=>p.month===0?{year:p.year-1,month:11}:{...p,month:p.month-1});
  const nextMonth=()=>setViewDate(p=>p.month===11?{year:p.year+1,month:0}:{...p,month:p.month+1});

  const cells=[];
  const prevDays=new Date(year,month,0).getDate();
  for(let i=firstDay-1;i>=0;i--)cells.push({day:prevDays-i,cur:false});
  for(let i=1;i<=daysInMonth;i++)cells.push({day:i,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-daysInMonth-firstDay+1,cur:false});

  const dayEvents=(y,m,d)=>{const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;return events.filter(e=>e.date===key)};
  const dateStr=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const selectedEvts=events.filter(e=>e.date===selected);
  const todayStr=today();

  const openAdd=()=>{setForm({...emptyForm,date:selected});setModal('add')};
  const openEdit=(ev)=>{setForm({...ev});setEditing(ev.id);setModal('edit')};
  const closeModal=()=>{setModal(null);setEditing(null)};
  const save=()=>{
    if(!form.title)return;
    if(modal==='add'){
      setEvents(p=>[...p,{...form,id:uid()}]);addToast(t(lang,'eventAdded'));
    } else {
      setEvents(p=>p.map(e=>e.id===editing?{...form,id:editing}:e));addToast(t(lang,'eventUpdated'));
    }
    closeModal();
  };
  const del=(id)=>{setEvents(p=>p.filter(e=>e.id!==id));addToast(t(lang,'eventDeleted'));setConfirm(null)};
  const agendaEvts=[...events].filter(e=>{
    const d=new Date(e.date);return d.getMonth()===month&&d.getFullYear()===year;
  }).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const monthName=t(lang,MONTHS[month]);
  const formField=(label,children)=>h('div',{className:'form-group'},h('label',{className:'form-label'},label),children);

  return h('div',null,
    h('div',{className:'page-header'},
      h('div',null,h('h1',{className:'page-title'},t(lang,'calendar')),h('p',{className:'page-subtitle'},t(lang,'calendarSub'))),
      h('button',{className:'btn btn-primary',onClick:openAdd},'+  '+t(lang,'addEvent'))
    ),
    h('div',{className:'card'},
      h('div',{className:'flex items-center justify-between mb-4'},
        h('button',{className:'btn btn-ghost btn-icon',onClick:prevMonth},'←'),
        h('div',{className:'flex items-center gap-3'},
          h('h2',{className:'font-700',style:{fontSize:18}},monthName+' '+year),
          h('div',{className:'tabs'},
            h('div',{className:`tab ${tab==='month'?'active':''}`,onClick:()=>setTab('month')},t(lang,'thisMonth')),
            h('div',{className:`tab ${tab==='agenda'?'active':''}`,onClick:()=>setTab('agenda')},t(lang,'agenda'))
          )
        ),
        h('button',{className:'btn btn-ghost btn-icon',onClick:nextMonth},'→')
      ),
      tab==='month'&&h('div',null,
        h('div',{className:'cal-grid mb-2'},
          DAYS.map(d=>h('div',{key:d,className:'cal-day-name'},t(lang,d)))
        ),
        h('div',{className:'cal-grid'},
          cells.map((cell,i)=>{
            const ds=dateStr(year,month,cell.day);
            const evs=cell.cur?dayEvents(year,month,cell.day):[];
            const isToday=cell.cur&&ds===todayStr;
            const isSel=cell.cur&&ds===selected;
            return h('div',{key:i,
              className:`cal-cell ${!cell.cur?'other-month':''} ${isToday?'today':''} ${isSel?'selected':''}`,
              onClick:()=>{if(cell.cur)setSelected(ds)}
            },
              h('div',{className:'cal-date'},cell.day),
              evs.slice(0,2).map((e,j)=>h('div',{key:j,className:'cal-event-dot',title:e.title},e.title)),
              evs.length>2&&h('div',{style:{fontSize:10,color:'var(--text3)'}},`+${evs.length-2}`)
            );
          })
        )
      ),
      tab==='agenda'&&h('div',null,
        agendaEvts.length===0?h('div',{className:'empty'},h('div',{className:'empty-icon'},'📅'),h('div',{className:'empty-text'},t(lang,'noEvents'))):
        agendaEvts.map(ev=>h('div',{key:ev.id,className:'agenda-item'},
          h('div',{className:'agenda-time'},ev.time||'All day'),
          h('div',{style:{flex:1}},
            h('div',{className:'agenda-title'},ev.title),
            h('div',{className:'agenda-desc'},ev.date+(ev.description?' — '+ev.description:''))
          ),
          h('div',{className:'flex gap-2'},
            h('button',{className:'btn btn-ghost btn-icon',onClick:()=>openEdit(ev)},'✏️'),
            h('button',{className:'btn btn-ghost btn-icon text-red',onClick:()=>setConfirm(ev.id)},'🗑️')
          )
        ))
      )
    ),
    // Selected day panel
    tab==='month'&&h('div',{className:'card mt-4'},
      h('div',{className:'flex items-center justify-between mb-3'},
        h('h3',{className:'font-700'},fmtDate(selected)),
        h('button',{className:'btn btn-primary btn-sm',onClick:openAdd},'+  '+t(lang,'addEvent'))
      ),
      selectedEvts.length===0?h('p',{className:'text-sm text-3',style:{padding:'12px 0'}},t(lang,'noEvents')):
      selectedEvts.map(ev=>h('div',{key:ev.id,className:'agenda-item'},
        h('div',{className:'agenda-time'},ev.time||'All day'),
        h('div',{style:{flex:1}},
          h('div',{className:'agenda-title'},ev.title),
          ev.description&&h('div',{className:'agenda-desc'},ev.description)
        ),
        h('div',{className:'flex gap-2'},
          ev.reminder&&h('span',{title:'Reminder set',style:{fontSize:14}},'🔔'),
          h('button',{className:'btn btn-ghost btn-icon',onClick:()=>openEdit(ev)},'✏️'),
          h('button',{className:'btn btn-ghost btn-icon text-red',onClick:()=>setConfirm(ev.id)},'🗑️')
        )
      ))
    ),
    modal&&h(Modal,{title:t(lang,modal==='add'?'addEvent':'editEvent'),onClose:closeModal,
      footer:[
        h('button',{key:'c',className:'btn btn-secondary',onClick:closeModal},t(lang,'cancel')),
        h('button',{key:'s',className:'btn btn-primary',onClick:save},t(lang,'save'))
      ]},
      formField(t(lang,'eventTitle'),h('input',{className:'form-input',placeholder:t(lang,'enterTitle'),value:form.title,onChange:e=>setForm(p=>({...p,title:e.target.value}))})),
      formField(t(lang,'eventDesc'),h('textarea',{className:'form-input',placeholder:t(lang,'enterDesc'),value:form.description||'',onChange:e=>setForm(p=>({...p,description:e.target.value}))})),
      formField(t(lang,'date'),h('input',{className:'form-input',type:'date',value:form.date,onChange:e=>setForm(p=>({...p,date:e.target.value}))})),
      formField('Time',h('input',{className:'form-input',type:'time',value:form.time||'',onChange:e=>setForm(p=>({...p,time:e.target.value}))})),
      h('div',{className:'flex items-center gap-3'},
        h('div',{className:`toggle ${form.reminder?'on':''}`,onClick:()=>setForm(p=>({...p,reminder:!p.reminder}))}),
        h('span',{className:'text-sm font-600'},t(lang,'reminder'))
      )
    ),
    confirm&&h(ConfirmModal,{message:'Delete this event?',onConfirm:()=>del(confirm),onClose:()=>setConfirm(null),lang})
  );
}

  const toggle=(id)=>setTasks(p=>p.map(tk=>tk.id===id?{...tk,done:!tk.done}:tk));
  
  const filtered=tasks.filter(tk=>{

  }).sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;

  const total=tasks.length,done=tasks.filter(t=>t.done).length,pending=total-done;
  const formField=(label,children)=>h('div',{className:'form-group'},h('label',{className:'form-label'},label),children);

    h('div',{className:'grid grid-3 mb-4'},

// AI ASSISTANT
// ═══════════════════════════════════════════════
const AI_TOOLS=[
  {key:'general',icon:'💬'},
  {key:'studyPlanner',icon:'📚'},
  {key:'captionGen',icon:'📷'},
  {key:'hashtagGen',icon:'#'},
  {key:'scheduleGen',icon:'🗓️'},
];
function AiAssistant({lang,settings,addToast}){
  const [chats,setChats]=useState(()=>LS.get('chats',[{id:uid(),title:'New Chat',messages:[]}]));
  const [activeChatId,setActiveChatId]=useState(null);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [tool,setTool]=useState('general');
  const [confirm,setConfirm]=useState(null);
  const messagesEndRef=useRef(null);

  useEffect(()=>{LS.set('chats',chats)},[chats]);
  useEffect(()=>{if(!activeChatId&&chats.length>0)setActiveChatId(chats[0].id)},[]);
  useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:'smooth'})},[chats,activeChatId]);

  const activeChat=chats.find(c=>c.id===activeChatId);
  const newChat=()=>{
    const nc={id:uid(),title:t(lang,'newChat'),messages:[]};
    setChats(p=>[nc,...p]);setActiveChatId(nc.id);
  };
  const delChat=(id)=>{
    const remaining=chats.filter(c=>c.id!==id);
    setChats(remaining);
    if(activeChatId===id)setActiveChatId(remaining[0]?.id||null);
    addToast(t(lang,'deleted'));setConfirm(null);
  };

  const getSystemPrompt=()=>{
    const tools={
      general:'You are LackyLife AI Assistant. Be helpful, concise, and friendly.',
      studyPlanner:'You are a study planner. Help create effective study schedules, learning plans, and study tips.',
      captionGen:'You are a social media caption generator. Create engaging, creative captions for posts.',
      hashtagGen:'You are a hashtag generator. Generate relevant and trending hashtags for social media posts.',
      scheduleGen:'You are a daily schedule generator. Create balanced, productive daily schedules.',
    };
    return tools[tool]||tools.general;
  };

  const send=async()=>{
    if(!input.trim()||loading)return;
    const provider=settings.provider||'openai';
    const apiKey=provider==='openai'?settings.openaiKey:settings.geminiKey;
    if(!apiKey){addToast('Please add your API key in Settings','error');return;}
    const userMsg={role:'user',content:input.trim()};
    const msgs=[...((activeChat?.messages)||[]),userMsg];
    setChats(p=>p.map(c=>c.id===activeChatId?{...c,title:input.slice(0,40)||c.title,messages:[...c.messages,userMsg]}:c));
    setInput('');setLoading(true);
    try{
      let reply='';
      if(provider==='openai'){
        const res=await fetch('https://api.openai.com/v1/chat/completions',{
          method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
          body:JSON.stringify({model:'gpt-4.1-mini',messages:[{role:'system',content:getSystemPrompt()},...msgs.slice(-20)]})
        });
        const data=await res.json();
        if(data.error)throw new Error(data.error.message);
        reply=data.choices?.[0]?.message?.content||'No response';
      } else {
        const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{parts:[{text:getSystemPrompt()+'\n\nUser: '+input}]}]})
        });
        const data=await res.json();
        if(data.error)throw new Error(data.error.message);
        reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'No response';
      }
      const aiMsg={role:'assistant',content:reply};
      setChats(p=>p.map(c=>c.id===activeChatId?{...c,messages:[...c.messages,aiMsg]}:c));
    } catch(e){
      addToast('Error: '+e.message,'error');
    }
    setLoading(false);
  };

  const copy=(text)=>{navigator.clipboard.writeText(text).then(()=>addToast(t(lang,'copied')));};

  return h('div',{className:'chat-container flex'},
    // Sidebar
    h('div',{className:'chat-sidebar flex flex-col'},
      h('div',{className:'flex items-center justify-between p-3',style:{borderBottom:'1px solid var(--border)'}},
        h('span',{className:'font-700 text-sm'},t(lang,'chatHistory')),
        h('button',{className:'btn btn-primary btn-sm btn-icon',onClick:newChat,title:t(lang,'newChat')},'➕')
      ),
      h('div',{className:'flex-1 overflow-y-auto p-2'},
        chats.length===0?h('p',{className:'text-xs text-3 p-3'},t(lang,'noData')):
        chats.map(c=>h('div',{key:c.id,
          className:`flex items-center gap-2 p-2 rounded cursor-pointer text-sm ${c.id===activeChatId?'nav-item active':'nav-item'}`,
          onClick:()=>setActiveChatId(c.id)
        },
          h('span',{style:{fontSize:13}},'💬'),
          h('span',{style:{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}},c.title),
          h('button',{className:'btn btn-ghost',style:{padding:'2px 4px',fontSize:12,color:'var(--red)'},
            onClick:(e)=>{e.stopPropagation();setConfirm(c.id)}},'✕')
        ))
      )
    ),
    // Main Chat
    h('div',{className:'chat-main flex flex-col'},
      // Tools bar
      h('div',{className:'flex gap-2 p-3',style:{borderBottom:'1px solid var(--border)',flexWrap:'wrap'}},
        h('span',{className:'text-xs font-600 text-3 flex items-center'},t(lang,'toolsLabel')+':'),
        AI_TOOLS.map(ait=>h('button',{key:ait.key,
          className:`ai-tool ${tool===ait.key?'active':''}`,
          onClick:()=>setTool(ait.key)
        },ait.icon,h('span',null,t(lang,ait.key))))
      ),
      // Messages
      h('div',{className:'chat-messages'},
        !activeChat||activeChat.messages.length===0?
          h('div',{className:'empty',style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},
            h('div',{style:{fontSize:48}},'🤖'),
            h('div',{className:'empty-text mt-2'},'LackyLife AI'),
            h('div',{className:'empty-sub mt-1'},t(lang,'chatPlaceholder'))
          ):
          (activeChat.messages.map((msg,i)=>h('div',{key:i,className:`msg ${msg.role}`},
            h('div',{className:'msg-avatar'},msg.role==='user'?'U':'AI'),
            h('div',{className:'flex flex-col gap-1'},
              h('div',{className:'msg-bubble'},
                h('div',{className:'md-content',dangerouslySetInnerHTML:{__html:renderMd(msg.content)}})
              ),
              msg.role==='assistant'&&h('button',{className:'btn btn-ghost btn-sm',style:{alignSelf:'flex-start',fontSize:11},onClick:()=>copy(msg.content)},'📋 '+t(lang,'copyMessage'))
            )
          ))),
        loading&&h('div',{className:'msg assistant'},
          h('div',{className:'msg-avatar'},'AI'),
          h('div',{className:'msg-bubble'},
            h('span',{className:'typing-dot'}),h('span',{className:'typing-dot'}),h('span',{className:'typing-dot'})
          )
        ),
        h('div',{ref:messagesEndRef})
      ),
      // Input
      h('div',{className:'chat-input-area'},
        h('div',{className:'flex gap-2'},
          h('input',{
            className:'form-input flex-1',
            placeholder:t(lang,'typeMessage'),
            value:input,
            onChange:e=>setInput(e.target.value),
            onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}},
            disabled:loading
          }),
          h('button',{className:'btn btn-primary',onClick:send,disabled:loading||!input.trim()},loading?'..':'➤ '+t(lang,'send'))
        )
      )
    ),
    confirm&&h(ConfirmModal,{message:'Delete this chat?',onConfirm:()=>delChat(confirm),onClose:()=>setConfirm(null),lang})
  );
}

// SETTINGS

function Settings({lang,settings,setSettings,darkMode,setDarkMode,addToast,transactions,tasks,events,goals,setTransactions,setTasks,setEvents,setGoals}){
  const [form,setForm]=useState({...settings});
  const save=()=>{setSettings(form);LS.set('settings',form);addToast(t(lang,'settingsSaved'))};
  const exportData=()=>{
    const data={transactions,tasks,events,goals,settings,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='luckylife-backup-'+today()+'.json';a.click();
    addToast(t(lang,'dataExported'));
  };
  const importData=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.transactions)setTransactions(data.transactions);
        if(data.tasks)setTasks(data.tasks);
        if(data.events)setEvents(data.events);
        if(data.goals)setGoals(data.goals);
        addToast(t(lang,'dataImported'));
      }catch(err){addToast('Invalid file format','error');}
    };reader.readAsText(file);
    e.target.value='';
  };
  const fld=(label,key,type='text',placeholder='')=>h('div',{className:'form-group'},
    h('label',{className:'form-label'},label),
    h('input',{className:'form-input',type,placeholder,value:form[key]||'',
      onChange:e=>setForm(p=>({...p,[key]:e.target.value}))})
  );

  return h('div',null,
    h('div',{className:'page-header'},
      h('div',null,h('h1',{className:'page-title'},t(lang,'settings')),h('p',{className:'page-subtitle'},t(lang,'settingsSub')))
    ),
    h('div',{className:'grid grid-2 gap-4'},
      // Left column
      h('div',{className:'flex flex-col gap-4'},
        h('div',{className:'card'},
          h('div',{className:'settings-title'},t(lang,'apiSettings')),
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},t(lang,'provider')),
            h('select',{className:'form-input',value:form.provider||'openai',onChange:e=>setForm(p=>({...p,provider:e.target.value}))},
              h('option',{value:'openai'},'OpenAI (GPT)'),
              h('option',{value:'gemini'},'Google Gemini')
            )
          ),
          fld(t(lang,'openaiKey'),'openaiKey','password','sk-...'),
          fld(t(lang,'geminiKey'),'geminiKey','password','AI...'),
          h('p',{className:'text-xs text-3 mt-1'},t(lang,'apikeyNote')),
          h('button',{className:'btn btn-primary mt-3',onClick:save},t(lang,'save'))
        ),
        h('div',{className:'card'},
          h('div',{className:'settings-title'},t(lang,'localization')),
          h('div',{className:'settings-row'},
            h('div',{className:'settings-info'},
              h('div',{className:'settings-name'},t(lang,'language')),
              h('div',{className:'settings-desc'},'Interface language')
            ),
            h('select',{className:'form-input',style:{width:130},value:form.language||lang,onChange:e=>setForm(p=>({...p,language:e.target.value}))},
              h('option',{value:'en'},'🇺🇸 English'),
              h('option',{value:'id'},'🇮🇩 Bahasa Indonesia')
            )
          ),
          h('div',{className:'settings-row'},
            h('div',{className:'settings-info'},
              h('div',{className:'settings-name'},t(lang,'currency')),
              h('div',{className:'settings-desc'},'Display currency')
            ),
            h('select',{className:'form-input',style:{width:130},value:form.currency||'IDR',onChange:e=>setForm(p=>({...p,currency:e.target.value}))},
              h('option',{value:'IDR'},t(lang,'idr')),
              h('option',{value:'USD'},t(lang,'usd'))
            )
          ),
          h('button',{className:'btn btn-primary mt-3',onClick:save},t(lang,'save'))
        )
      ),
      // Right column
      h('div',{className:'flex flex-col gap-4'},
        h('div',{className:'card'},
          h('div',{className:'settings-title'},t(lang,'themeMode')),
          h('div',{className:'settings-row'},
            h('div',{className:'settings-info'},
              h('div',{className:'settings-name'},t(lang,'theme')),
              h('div',{className:'settings-desc'},darkMode?t(lang,'dark'):t(lang,'light')+' mode active')
            ),
            h('div',{className:'flex gap-2 items-center'},
              h('span',{style:{fontSize:13}},'☀️'),
              h('div',{className:`toggle ${darkMode?'on':''}`,onClick:()=>setDarkMode(p=>{LS.set('darkMode',!p);return !p;})}),
              h('span',{style:{fontSize:13}},'🌙')
            )
          )
        ),
        h('div',{className:'card'},
          h('div',{className:'settings-title'},t(lang,'dataManagement')),
          h('div',{className:'settings-row'},
            h('div',{className:'settings-info'},
              h('div',{className:'settings-name'},t(lang,'exportData')),
              h('div',{className:'settings-desc'},'Download backup JSON')
            ),
            h('button',{className:'btn btn-secondary',onClick:exportData},'📤 '+t(lang,'exportData'))
          ),
          h('div',{className:'settings-row'},
            h('div',{className:'settings-info'},
              h('div',{className:'settings-name'},t(lang,'importData')),
              h('div',{className:'settings-desc'},'Restore from backup')
            ),
            h('label',{className:'btn btn-secondary',style:{cursor:'pointer'}},
              '📥 '+t(lang,'importData'),
              h('input',{type:'file',accept:'.json',style:{display:'none'},onChange:importData})
            )
          ),
          h('div',{className:'settings-row'},
            h('div',{className:'settings-info'},
              h('div',{className:'settings-name'},'Clear All Data'),
              h('div',{className:'settings-desc'},'Remove all stored data')
            ),
            h('button',{className:'btn btn-danger',onClick:()=>{
              if(window.confirm('This will delete ALL your data. Are you sure?')){
                setTransactions([]);setTasks([]);setEvents([]);setGoals([]);
                addToast('All data cleared','info');
              }
            }},'🗑️ Clear All')
          )
        ),
        h('div',{className:'card'},
          h('div',{className:'settings-title'},'About LackyLife'),
          h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:12}},
            h('div',{className:'logo-icon',style:{width:48,height:48,fontSize:24}},'L'),
            h('div',null,
              h('div',{className:'font-700',style:{fontSize:16}},'LackyLife v1.0'),
              h('div',{className:'text-sm text-3'},'Personal Life Management Platform')
            )
          ),
          h('p',{className:'text-sm text-2'},'All your data is stored locally in your browser. No data is sent to any server.'),
          h('div',{className:'flex gap-2 mt-3'},
            h('span',{className:'badge badge-green'},'React 18'),
            h('span',{className:'badge badge-blue'},'Recharts'),
            h('span',{className:'badge badge-gray'},'Local Storage')
          )
        )
      )
    )
  );
}

function App(){
  const [page,setPage]=useState('dashboard');
  const [lang,setLang]=useState(()=>LS.get('lang','en'));
  const [darkMode,setDarkMode]=useState(()=>LS.get('darkMode',false));
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [settings,setSettings]=useState(()=>LS.get('settings',{openaiKey:'',geminiKey:'',provider:'openai',currency:'IDR',language:'en'}));
  const [transactions,setTransactions]=useState(()=>LS.get('transactions',[]));
  const [tasks,setTasks]=useState(()=>LS.get('tasks',[]));
  const [events,setEvents]=useState(()=>LS.get('events',[]));
  const [goals,setGoals]=useState(()=>LS.get('goals',[]));
  const {toasts,addToast,removeToast}=useToast();
  
  const currency=settings.currency||'IDR';
  
  // Persist all data
  useEffect(()=>{LS.set('transactions',transactions)},[transactions]);
  useEffect(()=>{LS.set('tasks',tasks)},[tasks]);
  useEffect(()=>{LS.set('events',events)},[events]);
  useEffect(()=>{LS.set('goals',goals)},[goals]);
  
  // Sync lang from settings
  useEffect(()=>{if(settings.language&&settings.language!==lang){setLang(settings.language);LS.set('lang',settings.language)}},[settings.language]);
  
  // Apply dark mode
  useEffect(()=>{
    document.documentElement.className=darkMode?'dark':'';
    document.body.style.background='var(--bg)';
  },[darkMode]);

  const navTo=(p)=>setPage(p);
  const props={lang,addToast,currency};
  const dataProps={transactions,setTransactions,tasks,setTasks,events,setEvents,goals,setGoals};

  return h('div',{className:'app'},
    darkMode&&h('style',null,'.dark{color-scheme:dark}'),
    h(Sidebar,{page,setPage,lang,tasks,sidebarOpen,setSidebarOpen}),
    sidebarOpen&&h('div',{
      style:{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',zIndex:99},
      onClick:()=>setSidebarOpen(false)
    }),
    h('div',{className:'main'},
      h(Navbar,{page,lang,setLang,darkMode,setDarkMode,sidebarOpen,setSidebarOpen}),
      h('div',{className:'content'},
        page==='dashboard'&&h(Dashboard,{...props,...dataProps,onNav:navTo}),
        page==='finance'&&h(Finance,{...props,...dataProps}),
        page==='savings'&&h(Savings,{...props,...dataProps}),
        page==='calendar'&&h(Calendar,{...props,...dataProps}),
        page==='todos'&&h(Todos,{...props,...dataProps}),
        page==='ai'&&h(AiAssistant,{...props,settings}),
        page==='settings'&&h(Settings,{...props,...dataProps,settings,setSettings,darkMode,setDarkMode}),
      )
    ),
    h(ToastContainer,{toasts,removeToast})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
